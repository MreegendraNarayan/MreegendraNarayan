name: Update GitHub Profile

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dateutil requests lxml python-dotenv

      - name: Generate profile SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN_SECRET }}
          USER_NAME: MreegendraNarayan
        run: python generate_profile.py

      - name: Commit and push changes
        run: |
          git config --global user.name "🤖 GitHub Action"
          git config --global user.email "action@github.com"
          git add dark_mode.svg light_mode.svg
          git commit -m "📊 Update profile stats - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push

      - name: Create/Update workflow badge
        run: echo "✅ Profile updated at $(date)" >> README.md
